<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Serv</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #050816;
      color: #ffffff;
      height: 100vh;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .background {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 255, 200, 0.15), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(0, 140, 255, 0.15), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(180, 0, 255, 0.12), transparent 40%),
        #050816;
      z-index: 0;
    }

    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 90%);
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 720px;
      padding: 60px 50px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10, 14, 32, 0.72);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      text-align: center;
      box-shadow:
        0 0 80px rgba(0, 180, 255, 0.08),
        inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .logo {
      font-size: 14px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      margin-bottom: 26px;
    }

    h1 {
      font-size: clamp(2.6rem, 6vw, 5rem);
      font-weight: 600;
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -0.05em;
    }

    h1 span {
      background: linear-gradient(90deg, #ffffff, #7dd3fc);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: rgba(255,255,255,0.65);
      font-size: 1rem;
      line-height: 1.8;
      max-width: 520px;
      margin: 0 auto 36px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.82);
      font-size: 0.95rem;
      letter-spacing: 0.04em;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 18px #22c55e;
      animation: pulse 1.8s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.8);
        opacity: 0.4;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .corner {
      position: absolute;
      width: 120px;
      height: 120px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      z-index: 1;
    }

    .corner.top-left {
      top: 30px;
      left: 30px;
    }

    .corner.bottom-right {
      bottom: 30px;
      right: 30px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 42px 28px;
      }

      p {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="grid"></div>

  <div class="corner top-left"></div>
  <div class="corner bottom-right"></div>

  <main class="container">
    <div class="logo">SECURE SERV</div>

    <h1>
      Estamos <span>preparando</span><br>
      algo mejor.
    </h1>

    <p>
      Muy pronto volveremos online con una experiencia renovada,
      manteniendo el mismo enfoque en tecnología, seguridad y rendimiento.
    </p>

    <div class="status">
      <div class="pulse"></div>
      Sitio temporalmente no disponible
    </div>
  </main>
</body>
</html>
